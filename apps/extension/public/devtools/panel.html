<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Abid Debugger</title>
    <link rel="stylesheet" href="panel.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="brand">
        <span class="mark" aria-hidden="true"></span>
        <div>
          <h1>Abid Debugger</h1>
          <p id="status-line">Live capture ready</p>
        </div>
      </div>
      <div class="actions">
        <button id="btn-toggle" type="button" title="Live capture ko pause/resume karta hai">Pause Capture</button>
        <button id="btn-analyze" type="button" title="Captured data ko local AI engine me analyze karta hai">Analyze</button>
        <button id="btn-heap" type="button" title="Memory snapshot capture karta hai">Heap Snapshot</button>
        <button id="btn-clear" type="button" title="Panel ka current data clear karta hai">Clear</button>
      </div>
    </header>

    <nav class="tabs" aria-label="Debugger sections">
      <button class="active" type="button" data-tab="errors">Errors</button>
      <button type="button" data-tab="network">Network</button>
      <button type="button" data-tab="angular">Angular</button>
      <button type="button" data-tab="memory">Memory</button>
      <button type="button" data-tab="rxjs">RxJS</button>
      <button type="button" data-tab="performance">Performance</button>
      <button type="button" data-tab="ai">AI Suggestions</button>
      <button type="button" data-tab="fixes">Auto Fixes</button>
    </nav>

    <section class="filters" aria-label="Debugger filters">
      <label>
        Search
        <input id="filter-query" type="search" placeholder="component, API, error..." />
      </label>
      <label>
        Severity
        <select id="filter-severity">
          <option value="all">All</option>
          <option value="critical">Critical</option>
          <option value="high">High</option>
          <option value="medium">Medium</option>
          <option value="low">Low</option>
          <option value="info">Info</option>
          <option value="warn">Warn</option>
          <option value="error">Error</option>
        </select>
      </label>
      <label>
        Network speed
        <select id="filter-speed">
          <option value="all">All</option>
          <option value="failed">Failed</option>
          <option value="slow">Slow 1500ms+</option>
          <option value="medium">Medium 500ms+</option>
          <option value="fast">Fast &lt;500ms</option>
        </select>
      </label>
      <label class="check">
        <input id="filter-issues" type="checkbox" />
        Only issues
      </label>
      <button id="btn-filter-clear" type="button">Reset filters</button>
    </section>

    <main id="panel-main" class="panel" aria-live="polite"></main>
    <script src="panel.js"></script>
  </body>
</html>
